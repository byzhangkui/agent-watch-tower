name: Package

on:
  # 推送到 main 分支时自动打包
  push:
    branches: [main]
  # 支持手动触发，可指定版本号
  workflow_dispatch:
    inputs:
      version:
        description: "版本号 (例如 0.2.0)，留空则使用 Info.plist 中的版本"
        required: false
        type: string
      create_release:
        description: "是否创建 GitHub Release"
        required: false
        type: boolean
        default: false

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  package:
    name: Build & Package
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      # ── 确定版本号 ──────────────────────────────────────────────
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Resources/Info.plist)
          fi
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "build_number=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION (build ${{ github.run_number }}, sha $SHORT_SHA)"

      - name: Stamp version into Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.build_number }}" Resources/Info.plist

      # ── 构建 ────────────────────────────────────────────────────
      - name: Resolve dependencies
        run: swift package resolve

      - name: Build release
        run: swift build -c release

      - name: Run tests
        run: swift test

      # ── 组装 .app 包 ────────────────────────────────────────────
      - name: Assemble .app bundle
        run: make bundle

      - name: Ad-hoc code sign
        run: |
          codesign --force --deep --sign - \
            --entitlements Resources/AgentWatchTower.entitlements \
            .build/AgentWatchTower.app

      - name: Verify code sign
        run: codesign --verify --deep --strict .build/AgentWatchTower.app

      - name: Verify bundle structure
        run: |
          test -d .build/AgentWatchTower.app/Contents/MacOS
          test -f .build/AgentWatchTower.app/Contents/MacOS/AgentWatchTower
          test -f .build/AgentWatchTower.app/Contents/Info.plist
          test -f .build/AgentWatchTower.app/Contents/Resources/AppIcon.icns
          echo "✅ Bundle structure verified"

      # ── 创建安装包 ──────────────────────────────────────────────
      - name: Create DMG
        id: dmg
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="AgentWatchTower-${VERSION}.dmg"
          STAGING="$(mktemp -d)"

          cp -R .build/AgentWatchTower.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create -volname "Agent Watch Tower" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            ".build/$DMG_NAME"

          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "✅ DMG created: $DMG_NAME"

      - name: Create ZIP
        id: zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="AgentWatchTower-${VERSION}.zip"
          cd .build
          ditto -c -k --sequesterRsrc --keepParent AgentWatchTower.app "$ZIP_NAME"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "✅ ZIP created: $ZIP_NAME"

      - name: Generate SHA256 checksums
        run: |
          cd .build
          shasum -a 256 "${{ steps.dmg.outputs.dmg_name }}" > checksums.txt
          shasum -a 256 "${{ steps.zip.outputs.zip_name }}" >> checksums.txt
          echo "📋 Checksums:"
          cat checksums.txt

      # ── 上传构建产物 ────────────────────────────────────────────
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentWatchTower-${{ steps.version.outputs.version }}-dmg
          path: .build/${{ steps.dmg.outputs.dmg_name }}
          retention-days: 30

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentWatchTower-${{ steps.version.outputs.version }}-zip
          path: .build/${{ steps.zip.outputs.zip_name }}
          retention-days: 30

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: .build/checksums.txt
          retention-days: 30

      # ── 可选：创建 GitHub Release ───────────────────────────────
      - name: Create GitHub Release
        if: inputs.create_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Agent Watch Tower v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            .build/${{ steps.dmg.outputs.dmg_name }}
            .build/${{ steps.zip.outputs.zip_name }}
            .build/checksums.txt

      - name: Summary
        run: |
          echo "## 🎉 打包完成" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| 项目 | 值 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 版本 | ${{ steps.version.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 构建号 | ${{ steps.version.outputs.build_number }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | ${{ steps.version.outputs.short_sha }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| DMG | \`${{ steps.dmg.outputs.dmg_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ZIP | \`${{ steps.zip.outputs.zip_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "构建产物可在 Actions 页面的 Artifacts 区域下载。" >> "$GITHUB_STEP_SUMMARY"
