<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- macOS Menu Bar Icon Template -->
  <!-- Designed to be monochromatic (black) and scale down gracefully to 22x22 -->
  
  <rect x="10" y="20" width="80" height="60" rx="12" fill="none" stroke="#000000" stroke-width="8"/>
  
  <!-- Terminal Prompt > -->
  <path d="M 28 40 L 42 50 L 28 60" fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Cursor _ -->
  <line x1="50" y1="60" x2="72" y2="60" stroke="#000000" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Optional: Little status dot representing the 'Agent Watch' aspect -->
  <circle cx="72" cy="35" r="5" fill="#000000" />
</svg>